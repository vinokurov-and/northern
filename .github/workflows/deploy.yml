name: Deploy Northern

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [deploy-client]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # --- Сборка клиента Total (GameChallenge) ---
      - name: Checkout Total client
        uses: actions/checkout@v4
        with:
          repository: vinokurov-and/Game-Challenge
          path: total
          token: ${{ secrets.TOTAL_REPO_TOKEN }}

      - name: Setup Node 20 for Total client
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Total client (Expo web)
        working-directory: total/client
        run: |
          npm ci
          npx expo export --platform web --output-dir ./build

      - name: Copy Total client to northern/public/app
        run: |
          rm -rf public/app
          cp -r total/client/build public/app
          echo "Client build copied to public/app/"
          ls -la public/app/

      - name: Restore Node 18 for Northern
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      # --- Конец сборки клиента Total ---

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build static site
        run: npm run build
        env:
          DATOCMS_API_TOKEN: ${{ secrets.DATOCMS_API_TOKEN }}

      - name: Generate version.json
        run: |
          echo '{
            "commit": "'${{ github.sha }}'",
            "branch": "'${{ github.ref_name }}'",
            "buildTime": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
            "message": "'$(git log -1 --pretty=%s | sed 's/"/\\"/g')'"
          }' > out/version.json

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -T 10 -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          # Keepalive — без него scp/rsync через тысячи мелких файлов
          # может молча зависнуть на оборванном соединении
          cat > ~/.ssh/config <<'EOF'
          Host *
            ServerAliveInterval 30
            ServerAliveCountMax 3
            ConnectTimeout 30
            TCPKeepAlive yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy static site
        timeout-minutes: 10
        run: |
          echo "Syncing out/ to remote (rsync, не scp — из-за тысяч мелких файлов в _expo/)..."
          # rsync с --delete: атомарный delta-sync, быстрее scp в 5-10 раз для тысяч файлов,
          # надёжнее при разрывах (re-connect не теряет прогресс).
          # На сервере rsync должен быть установлен (есть, используется ниже для express-server).
          rsync -az --delete --partial \
            -e "ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=3" \
            out/ root@${{ secrets.SERVER_HOST }}:/fcsever/out/

          echo "Static site deployed"

      - name: Deploy express-server
        timeout-minutes: 10
        run: |
          echo "Uploading express-server (excluding node_modules and db)..."
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude 'db-northen.sqlite' \
            -e "ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=3" \
            express-server/ root@${{ secrets.SERVER_HOST }}:/fcsever/express-server/

          echo "Installing dependencies on remote..."
          ssh root@${{ secrets.SERVER_HOST }} "export NVM_DIR=/root/.nvm && source \$NVM_DIR/nvm.sh && nvm use 20 && cd /fcsever/express-server && npm i --silent"

      - name: Restart express-server (northern only)
        timeout-minutes: 5
        run: |
          ssh root@${{ secrets.SERVER_HOST }} "
            # Pre-check: rsync действительно положил новый server.js на хост.
            # Без маркера свежего кода нет смысла трогать живой процесс.
            DEPLOYED_MARKER=\$(grep -c \"/match/:gameId\" /fcsever/express-server/server.js || echo 0)
            echo \"Fresh-code marker on remote (expected >=1): \$DEPLOYED_MARKER\"
            if [ \"\$DEPLOYED_MARKER\" = '0' ]; then
              echo 'ERROR: rsync did not deliver new server.js (marker missing)'
              exit 1
            fi

            # screen -X quit шлёт SIGHUP bash-процессу внутри window. Если bash
            # запущен БЕЗ exec, SIGHUP убивает bash, а node остаётся orphan'ом
            # и продолжает держать 443 → новый node падает с EADDRINUSE, а
            # lsof -i:443 видит старого и рапортует 'OK'. Именно так тихо
            # провалился предыдущий deploy (выяснено 2026-04-25).
            screen -S server -X quit 2>/dev/null || true
            sleep 2

            export NVM_DIR=/root/.nvm && source \$NVM_DIR/nvm.sh && nvm use 20
            cd /fcsever/express-server

            # 'exec node' заменяет bash-процесс на node внутри screen-окна —
            # теперь screen управляет node напрямую, без orphan'ов.
            screen -dmS server bash -c 'export NVM_DIR=/root/.nvm && source \$NVM_DIR/nvm.sh && nvm use 20 && exec node server.js >> /fcsever/northern.log 2>&1'
            sleep 4

            # Health-check №1: порт слушается хоть кем-то.
            if ! lsof -i:443 > /dev/null 2>&1; then
              echo 'ERROR: Northern is not listening on port 443 after restart'
              tail -80 /fcsever/northern.log 2>/dev/null || true
              exit 1
            fi

            # Health-check №2: процесс на 443 — именно наш, из /fcsever/express-server.
            # Если cwd другой, это orphan/старый слушатель — fail fast.
            NEW_PID=\$(lsof -t -i:443 | head -1)
            NEW_CWD=\$(readlink -f /proc/\$NEW_PID/cwd 2>/dev/null || echo 'unknown')
            echo \"Listener on 443: pid=\$NEW_PID cwd=\$NEW_CWD\"
            if [ \"\$NEW_CWD\" != '/fcsever/express-server' ]; then
              echo \"ERROR: pid \$NEW_PID on port 443 runs from \$NEW_CWD — stale listener still owns the port\"
              tail -80 /fcsever/northern.log 2>/dev/null || true
              exit 1
            fi

            # Health-check №3: сам endpoint отвечает og:title. Без этого шага
            # прошлый deploy тихо задеплоил только out/ и считал успехом.
            sleep 2
            if ! curl -ks --max-time 10 --resolve fc-sever.ru:443:127.0.0.1 https://fc-sever.ru/match/1 -A 'facebookexternalhit' | grep -q 'og:title'; then
              echo 'ERROR: /match/:id handler did not return og:title — deploy incomplete'
              tail -80 /fcsever/northern.log 2>/dev/null || true
              exit 1
            fi
            echo 'OK: Northern express-server running and /match/:id handler returns OG tags'

            # Total server-app (port 83) — отдельная screen, рестартуем только если упал.
            if lsof -i:83 > /dev/null 2>&1; then
              echo 'Total server-app is running on port 83'
            else
              echo 'WARNING: Total server-app is down, restarting...'
              cd /mobile-app/app
              screen -dmS server-app bash -c 'export NVM_DIR=/root/.nvm && source \$NVM_DIR/nvm.sh && nvm use 20 && exec stdbuf -oL node src/index.js >> /mobile-app/app/server.log 2>&1'
              sleep 5
              lsof -i:83 > /dev/null 2>&1 && echo 'Total restarted' || echo 'ERROR: Total failed to start'
            fi
          "
