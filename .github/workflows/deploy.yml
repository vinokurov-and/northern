name: Deploy Northern

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [deploy-client]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # --- Сборка клиента Total (GameChallenge) ---
      - name: Checkout Total client
        uses: actions/checkout@v4
        with:
          repository: vinokurov-and/Game-Challenge
          path: total
          token: ${{ secrets.TOTAL_REPO_TOKEN }}

      - name: Setup Node 20 for Total client
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Total client (Expo web)
        working-directory: total/client
        run: |
          npm ci
          npx expo export --platform web --output-dir ./build

      - name: Copy Total client to northern/public/app
        run: |
          rm -rf public/app
          cp -r total/client/build public/app
          echo "Client build copied to public/app/"
          ls -la public/app/

      - name: Restore Node 18 for Northern
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      # --- Конец сборки клиента Total ---

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build static site
        run: npm run build
        env:
          DATOCMS_API_TOKEN: ${{ secrets.DATOCMS_API_TOKEN }}

      - name: Generate version.json
        run: |
          echo '{
            "commit": "'${{ github.sha }}'",
            "branch": "'${{ github.ref_name }}'",
            "buildTime": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
            "message": "'$(git log -1 --pretty=%s | sed 's/"/\\"/g')'"
          }' > out/version.json

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy static site
        run: |
          echo "Removing old static files..."
          ssh root@${{ secrets.SERVER_HOST }} "rm -rf /fcsever/out"

          echo "Uploading out/..."
          scp -r out root@${{ secrets.SERVER_HOST }}:/fcsever/out

          echo "Static site deployed"

      - name: Deploy express-server
        run: |
          echo "Uploading express-server (excluding node_modules and db)..."
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude 'db-northen.sqlite' \
            express-server/ root@${{ secrets.SERVER_HOST }}:/fcsever/express-server/

          echo "Installing dependencies on remote..."
          ssh root@${{ secrets.SERVER_HOST }} "export NVM_DIR=/root/.nvm && source \$NVM_DIR/nvm.sh && nvm use 20 && cd /fcsever/express-server && npm i --silent"

      - name: Restart express-server (northern only)
        run: |
          ssh root@${{ secrets.SERVER_HOST }} "
            screen -S server -X quit 2>/dev/null || true
            sleep 1
            export NVM_DIR=/root/.nvm && source \$NVM_DIR/nvm.sh && nvm use 20
            cd /fcsever/express-server
            screen -dmS server bash -c 'export NVM_DIR=/root/.nvm && source \$NVM_DIR/nvm.sh && nvm use 20 && node server.js'
            sleep 3
            if lsof -i:443 > /dev/null 2>&1; then
              echo 'Northern express-server is running on port 443'
            else
              echo 'ERROR: Northern is not listening on port 443'
              exit 1
            fi
            # Проверяем что total server-app тоже жив
            if lsof -i:83 > /dev/null 2>&1; then
              echo 'Total server-app is running on port 83'
            else
              echo 'WARNING: Total server-app is down, restarting...'
              cd /mobile-app/app
              screen -dmS server-app bash -c 'export NVM_DIR=/root/.nvm && source \$NVM_DIR/nvm.sh && nvm use 20 && exec stdbuf -oL node src/index.js >> /mobile-app/app/server.log 2>&1'
              sleep 5
              lsof -i:83 > /dev/null 2>&1 && echo 'Total restarted' || echo 'ERROR: Total failed to start'
            fi
          "
